<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz – Ren klud til hver ko</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #d8d5c8;
    }

    .quiz-wrapper {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background-image: url('Baggrund.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      flex-direction: column;   /* 🔥 DET VIGTIGE */
      align-items: flex-start;
      justify-content: flex-start;
      padding: 7vh 7vw;
    }

    .quiz-ko1 {
      position: absolute;
      bottom: 8%;
      right: 12%;
      width: clamp(180px, 22vw, 360px);
      height: auto;
      z-index: 2;
      pointer-events: none;
    }

    .quiz-ko2 {
      position: absolute;
      bottom: 4%;
      right: 4%;
      width: clamp(180px, 22vw, 360px);
      height: auto;
      z-index: 2;
      pointer-events: none;
    }

    .quiz-content1 {
      max-width: 1200px;
      color: #000;
      margin-bottom: 40px;
    
    }

    .quiz-content2 {
      max-width: 1400px;
      color: #000;
    }

    .quiz-title {
      font-size: clamp(2rem, 3vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      margin: 0 0 12px 0;
    }

    .quiz-subtitle {
      font-size: clamp(1.5rem, 2vw, 2.5rem);
      font-style: italic;
      font-weight: 400;
      margin: 0 0 70px 0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 34px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: clamp(1.25rem, 1.8vw, 2rem);
      line-height: 2.5;
      cursor: pointer;
      user-select: none;
    }

    .option input[type="radio"] {
      display: none;
    }

    .custom-radio {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border: 5px solid #4a4a4a;
      border-radius: 50%;
      background: #efefef;
      display: inline-block;
      position: relative;
    }

    .option input[type="radio"]:checked + .custom-radio::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #7b1e25;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .answer-button {
      margin-top: 70px;
      margin-left: 0;
      background: #8b2f36;
      color: white;
      border: none;
      padding: 22px 90px;
      font-size: clamp(1.4rem, 1.8vw, 2rem);
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.2);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .answer-button:hover {
      background: #73252b;
      transform: translateY(-1px);
    }

        .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .hidden {
      display: none;
    }

    .popup-content {
      background: #8faa8f;
      padding: 40px;
      width: 60%;
      max-width: 700px;
      text-align: center;
      position: relative;
    }

    .popup-icon {
      font-size: 60px;
      margin-bottom: 20px;
      color: gold;
    }

    .popup-content p {
      font-size: 1.5rem;
      color: white;
      margin-bottom: 30px;
    }

    #popup-button {
      background: #2f5d2f;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .answer-button:active {
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .quiz-wrapper {
        padding: 40px 24px;
      }

      .quiz-subtitle {
        margin-bottom: 40px;
      }

      .options {
        gap: 24px;
      }

      .custom-radio {
        width: 34px;
        height: 34px;
        min-width: 34px;
        border-width: 4px;
      }

      .option input[type="radio"]:checked + .custom-radio::after {
        width: 14px;
        height: 14px;
      }

      .answer-button {
        padding: 18px 50px;
        width: 100%;
        max-width: 320px;
      }
      #options-container {
        display: flex;
        flex-direction: column;
        gap: 34px;
      }
    }
    .quiz-end {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .quiz-end:not(.hidden) {
      opacity: 1;8
    }

    .hidden {
      display: none;
    }

    .end-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .end-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #5a1f1f;
    }

    .end-overlay h1 {
      font-size: clamp(3rem, 6vw, 5rem);
      margin-bottom: 20px;
    }

    .end-overlay p {
      font-size: clamp(1.5rem, 2.5vw, 3rem);
      line-height: 1.4;
    }

  </style>
</head>
<body>
  <div class="quiz-wrapper">
    <img src="Ko.png" alt="Ko1" class="quiz-ko1" />
    <img src="Ko.png" alt="Ko2" class="quiz-ko2" />

    <div class="quiz-content1">
      <h1 class="quiz-title" id="question-title"></h1>
      <p class="quiz-subtitle" id="question-counter">
        Vælg den rigtige svarmulighed
      </p>
    </div>

    <div class="quiz-content2">
      <form class="options" id="quiz-form">
        <div id="options-container"></div>

        <button type="submit" class="answer-button">Svar</button>
      </form>
    </div>
    </div>
        <div id="quiz-popup" class="popup hidden">
      <div class="popup-content">
        <div class="popup-icon" id="popup-icon">✔</div>
        <p id="popup-text"></p>
        <button id="popup-button">Næste</button>
      </div>  
    </div>    
  </div>

    <script>
      const popup = document.getElementById("quiz-popup");
      const popupText = document.getElementById("popup-text");
      const popupButton = document.getElementById("popup-button");

      function showPopup(text, isCorrect) {
        popupText.textContent = text;

        const icon = document.getElementById("popup-icon");
        icon.textContent = isCorrect ? "✔" : "✖";
        icon.style.color = isCorrect ? "gold" : "#a83232";

        popup.classList.remove("hidden");
      }

      function hidePopup() {
        popup.classList.add("hidden");
      }

      const questions = [
        {
          question: "Hvorfor skal man bruge en ren klud til hver enkelt ko?",
          answers: [
            "Kluden kommer til at lugte",
            "Kluden kan overføre yverbetændelse fra ko til ko.",
            "Pjat, kluden kan sagtens deles",
            "Koen vil ikke dele sin klud med andre køer"
          ],
          correct: 1
        },
        {
          question: "Hvorfor er foderbordet et høj-hygiejne område?",
          answers: [
            "Hvis maden bliver kontamineret med smitte, optager kvæget det meget nemt",
            "Foderbordet bliver hurtigt beskidt, fordi køerne savler meget, når de spiser",
            "Mange køer spiser det samme sted"
          ],
          correct: 0
        },
        {
          question: "Hvorfor er spædkalveafsnittet et høj-hygiejne afsnit?",
          answers: [
            "Fordi kalvene slikker meget på hinanden, når de har opbygget en god relation",
            "Fordi kalvene ikke har udviklet immunforsvar og er meget modtagelige for sygdomme",
            "Pjat med dig",
            "Fordi kalvene endnu ikke er renlige"
          ],
          correct: 1
        },
        {
          question: "Hvad er vigtigt at gøre ved sygdom hos dyrene?",
          answers: [
            "De skal altid behandles med smertestillende og antibiotika",
            "De bør sættes i sygeboks og derved isoleres fra raske dyr.",
            "De skal sendes til slagtning med det samme",
            "De skal bare have lov til at være i fred og ro, så går det over af sig selv"
          ],
          correct: 1
        },
        {
          question: "Hvordan skal gangarealer renholdes?",
          answers: [
            "Gangarealerne skal fejes en gang om året",
            "Gangarealer skal være tørre og uden gødning i videst muligt omfang",
            "Gangarealer skal fejes og vaskes mindst en gang i timen",
            "Gangarealerne skal fejes"
          ],
          correct: 1
        },
        {
          question: "Hvad er den bedste maksimum gruppestørrelse for yngre kalve?",
          answers: [
            "6 kalve pr. gruppe",
            "10 kalve pr. gruppe",
            "Gruppestørrelse har ingen indflydelse",
            "3 kalve pr. grupper"
          ],
          correct: 0
        },
        {
          question: "Hvor tit skal kælvingsudstyr vaskes?",
          answers: [
            "Hver gang det har været brugt",
            "1 gang om måneden",
            "1 gang om ugen",
            "1 gang om dagen"
          ],
          correct: 0
        },
        {
          question: "Hvilke basis hygiejneartikler bør som minimum være til rådighed i kalvestalden?",
          answers: [
            "Overtrækstøj, støvler og handsker",
            "Støvler, forklæder og handsker",
            "Forklæder og handsker",
            "Beskyttelsesbriller og handsker"
          ],
          correct: 0
        },
        {
          question: "Hvorfor skal kalve have råmælk/kolostrum senest 4 timer efter fødsel?",
          answers: [
            "Efter den tid begynder tarmbarrieren at lukke sig for antistoffer",
            "Fordi de er meget sultne, når de bliver født",
            "Det er noget pjat med de råmælk",
            "Fordi de er sløve og trætte"
          ],
          correct: 0
        },
        {
          question: "Hvilket fodtøj er acceptabelt på foderbordet?",
          answers: [
            "Rene støvler eller overtræksstøvler",
            "Al slags fodtøj",
            "Intet fodtøj er tilladt på foderbordet",
            "Træsko, støvler eller overtræksstøvler"
          ],
          correct: 0
        }
      ];

      const form = document.getElementById("quiz-form");
      const questionTitle = document.getElementById("question-title");
      const questionCounter = document.getElementById("question-counter");
      const optionsContainer = document.getElementById("options-container");

      let currentQuestion = 0;
      let score = 0;

      function loadQuestion() {
        const q = questions[currentQuestion];

        questionTitle.textContent = q.question;
        questionCounter.textContent = `Spørgsmål ${currentQuestion + 1} af ${questions.length} – vælg den rigtige svarmulighed`;

        optionsContainer.innerHTML = "";

        q.answers.forEach((answer, index) => {
          const label = document.createElement("label");
          label.className = "option";

          label.innerHTML = `
            <input type="radio" name="quiz-answer" value="${index}" />
            <span class="custom-radio"></span>
            <span>${answer}</span>
          `;

          optionsContainer.appendChild(label);
        });
      }

      function shuffleAnswers() {
        const q = questions[currentQuestion];

        const combined = q.answers.map((answer, index) => ({
          answer: answer,
          isCorrect: index === q.correct
        }));

        for (let i = combined.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [combined[i], combined[j]] = [combined[j], combined[i]];
        }

        q.answers = combined.map(item => item.answer);
        q.correct = combined.findIndex(item => item.isCorrect);

        loadQuestion();
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const selected = document.querySelector('input[name="quiz-answer"]:checked');

        if (!selected) {
          alert("Vælg et svar først.");
          return;
        }

        const selectedAnswer = Number(selected.value);
        const q = questions[currentQuestion];

        if (selectedAnswer === q.correct) {
          showPopup("Du har svaret rigtigt på spørgsmålet!", true);

          currentQuestion++;

          if (currentQuestion < questions.length) {
              loadQuestion();
            } else {
              document.querySelector(".quiz-wrapper").style.display = "none";
              document.getElementById("quiz-end").classList.remove("hidden");
            }
        } else {
          showPopup("Forkert svar – prøv igen!", false);
          shuffleAnswers();
        }
      });

      popupButton.addEventListener("click", () => {
      hidePopup();

      const q = questions[currentQuestion];
      const selected = document.querySelector('input[name="quiz-answer"]:checked');

      if (selected && Number(selected.value) === q.correct) {
        currentQuestion++;

        if (currentQuestion < questions.length) {
          loadQuestion();
        } else {
          questionTitle.textContent = "Quizzen er færdig!";
          questionCounter.textContent = `Du er færdig 🎉`;
          optionsContainer.innerHTML = "";
          document.querySelector(".answer-button").style.display = "none";
        }
      } else {
        shuffleAnswers();
      }
      });


  loadQuestion();
</script>

<div id="quiz-end" class="quiz-end hidden">
  <video autoplay muted loop class="end-video">
    <source src="Mere komprimeret.mp4" type="video/mp4">
  </video>

  <div class="end-overlay">
    <h1>Tillykke!</h1>
    <p>I har gennemført quizzen<br>og er klar til næste udfordring.</p>
  </div>
</div>
</body>
</html>
