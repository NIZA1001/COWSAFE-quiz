<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Det er quiz-tid!</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    
    }

#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}


    
    .intro-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      color: red;
    }

    .intro-title {
      margin: 0 0 60px 0;
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 400;
      line-height: 1.05;
      color: #5a0f18;
      background-color: #005521;
    }

    .start-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 320px;
      padding: 28px 80px;
      border: none;
      border-radius: 28px;
      background-color: #8d2430;
      color: #111;
      font-size: clamp(1.8rem, 3vw, 3.2rem);
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.16);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .start-button:hover {
      background-color: #7c1f2a;
      transform: translateY(-2px);
    }

    .start-button:active {
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .intro-title {
        font-size: clamp(2.8rem, 12vw, 5rem);
        margin-bottom: 40px;
      }

      .start-button {
        width: 100%;
        max-width: 360px;
        min-width: auto;
        padding: 22px 30px;
        font-size: clamp(1.6rem, 7vw, 2.4rem);
      }
    }
  </style>
</head>
<body>
  
<video autoplay muted loop playsinline id="bg-video">
  <source src="Mere komprimeret.mp4" type="video/mp4">
</video>

  <main class="intro-wrapper">
    <h1 class="intro-title">Det er quiz-tid!</h1>

    <a href="sporgsmal1.html" class="start-button">Start quiz</a>
  </main>
</body>
</html>
